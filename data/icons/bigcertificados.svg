<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- CommunityBig gradient: accent blue → purple -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f2d"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#151530"/>
    </linearGradient>
    <!-- Shield fill: blue → purple accent gradient -->
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0a84ff"/>
      <stop offset="60%" stop-color="#bf5af2"/>
      <stop offset="100%" stop-color="#a884ff"/>
    </linearGradient>
    <!-- Inner glow -->
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#5ac8fa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Lock body gradient -->
    <linearGradient id="lockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f7"/>
      <stop offset="100%" stop-color="#d4d4d4"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Subtle inner shadow on shield -->
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="2"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#5ac8fa" flood-opacity="0.4"/>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square -->
  <rect x="24" y="24" width="464" height="464" rx="88" ry="88" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Ambient glow behind shield -->
  <ellipse cx="256" cy="240" rx="160" ry="160" fill="url(#glow)"/>

  <!-- Shield shape -->
  <path d="M256 80
           C256 80 136 116 100 152
           C100 152 84 264 104 336
           C124 408 196 452 256 468
           C316 452 388 408 408 336
           C428 264 412 152 412 152
           C376 116 256 80 256 80Z"
        fill="url(#shieldFill)" opacity="0.92" filter="url(#innerGlow)"/>

  <!-- Shield inner edge highlight -->
  <path d="M256 104
           C256 104 152 136 120 168
           C120 168 106 268 124 332
           C142 396 204 436 256 450
           C308 436 370 396 388 332
           C406 268 392 168 392 168
           C360 136 256 104 256 104Z"
        fill="none" stroke="#5ac8fa" stroke-width="1.5" opacity="0.35"/>

  <!-- Lock: shackle (arc) -->
  <path d="M216 228 L216 196 C216 164 232 148 256 148 C280 148 296 164 296 196 L296 228"
        fill="none" stroke="url(#lockGrad)" stroke-width="14" stroke-linecap="round"/>

  <!-- Lock body (rounded rect) -->
  <rect x="200" y="224" width="112" height="96" rx="14" ry="14" fill="url(#lockGrad)"/>

  <!-- Keyhole -->
  <circle cx="256" cy="260" r="14" fill="#1a1a3e"/>
  <path d="M256 268 L248 296 L264 296 Z" fill="#1a1a3e"/>

  <!-- Certificate lines below lock (document representation) -->
  <g opacity="0.7">
    <rect x="208" y="340" width="96" height="5" rx="2.5" fill="#f5f5f7"/>
    <rect x="216" y="354" width="80" height="4" rx="2" fill="#a1a1a6"/>
    <rect x="220" y="366" width="72" height="4" rx="2" fill="#a1a1a6"/>
  </g>

  <!-- Digital certificate seal / checkmark badge -->
  <circle cx="340" cy="364" r="32" fill="#30d158" opacity="0.95"/>
  <circle cx="340" cy="364" r="24" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.6"/>
  <polyline points="326,364 335,374 356,352" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small accent dots (community feel) -->
  <circle cx="140" cy="400" r="4" fill="#bf5af2" opacity="0.5"/>
  <circle cx="380" cy="120" r="3" fill="#5ac8fa" opacity="0.4"/>
  <circle cx="130" cy="140" r="3" fill="#0a84ff" opacity="0.4"/>
</svg>
