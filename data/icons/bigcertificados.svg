<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Blue gradient background (security/professional theme) -->
    <linearGradient id="bgGrad" x1=".05" x2="1" y2="1">
      <stop offset=".2" stop-color="#1a3a6c" stop-opacity=".9"/>
      <stop offset=".205" stop-color="#4374ba"/>
      <stop offset="1" stop-color="#1e4d8c"/>
    </linearGradient>
    <!-- Lock body gradient -->
    <linearGradient id="lockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f7"/>
      <stop offset="100%" stop-color="#d4d4d8"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)" opacity=".9"/>

  <!-- BigLinux "big" mark — extracted from official BigLinux branding -->
  <g transform="translate(256, 120) scale(9.5) translate(-26.5, -12)"
     fill="#fff" fill-opacity=".95">
    <!-- Right helix of "big" -->
    <path d="M31.768 7.438q-.296 0-.623.054c-3.527.59-3.38 4.696-3.38 4.696s0
             1.817 1.696 2.736c1.411.814 2.223-.063 2.361-.201s3.009-3.73
             2.547 3.088c0 0 1.01-1.1 1.074-3.717.062-2.618-1.623-2.78
             -1.623-2.78s-.743-.188-2.22 1.409c-1.245 1.344-1.518 1.506
             -1.573 1.523h-.004s-.418.295-.468-.445-.21-2.978
             2.047-4.192c2.25-1.213 3.35 1.756 3.35 1.756s-.248-3.923
             -3.184-3.927"/>
    <!-- Dot of "i" -->
    <path d="M25.404 9.14a1.197 1.597 77.92 0 0-.414.046 1.197 1.597
             77.92 0 0-1.308 1.504 1.197 1.597 77.92 0 0 1.808.838 1.197
             1.597 77.92 0 0 1.313-1.506 1.197 1.597 77.92 0 0-1.399-.882"/>
    <!-- Left helix of "big" -->
    <path d="M17.973 9.645c-.015.017-1.011 1.115-1.073 3.713-.061
             2.618 1.618 2.774 1.618 2.774s.743.184 2.22-1.41c1.2-1.297
             1.5-1.495 1.567-1.524h.013s.416-.29.463.447c.048.738.211
             2.987-2.045 4.194-2.253 1.206-3.35-1.756-3.35-1.756s.287
             4.459 3.811 3.871c3.527-.588 3.38-4.695 3.38-4.695s.003-1.81
             -1.698-2.73c-1.411-.815-2.225.062-2.365.202s-3 3.729
             -2.541-3.086"/>
    <!-- Connector detail -->
    <path d="M25.914 11.821a1 1 0 0 0-.16.002 1.223 1.223 0 0
             0-1.125 1.317 1.2 1.2 0 0 0 .055.283s.708 2.825 4.535
             2.916c0 0-2.206-1.577-2.157-3.393a1.22 1.22 0 0
             0-1.148-1.125"/>
  </g>

  <!-- Lock: shackle (arc) -->
  <path d="M212 270 L212 232 C212 188 232 168 256 168 C280 168 300 188 300 232 L300 270"
        fill="none" stroke="url(#lockGrad)" stroke-width="18" stroke-linecap="round"/>

  <!-- Lock body (rounded rect) -->
  <rect x="192" y="264" width="128" height="108" rx="16" fill="url(#lockGrad)"/>

  <!-- Keyhole -->
  <circle cx="256" cy="304" r="16" fill="#1e3a6a"/>
  <path d="M256 316 L247 346 L265 346 Z" fill="#1e3a6a"/>

  <!-- Certificate lines below lock -->
  <g opacity=".6">
    <rect x="210" y="394" width="92" height="5" rx="2.5" fill="#f5f5f7"/>
    <rect x="218" y="408" width="76" height="4" rx="2" fill="#b0b0b6"/>
    <rect x="224" y="420" width="64" height="4" rx="2" fill="#b0b0b6"/>
  </g>

  <!-- Green checkmark badge -->
  <circle cx="340" cy="392" r="32" fill="#30d158" opacity=".95"/>
  <circle cx="340" cy="392" r="24" fill="none" stroke="#fff" stroke-width="2.5" opacity=".6"/>
  <polyline points="326,392 335,403 356,380" fill="none" stroke="#fff"
            stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
